server:
  port: 8080

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: localhost
      port: 6379
      password: redis123
  cloud:
    config:
      enabled: false

jwt:
  public-key: classpath:keys/public.pem

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always